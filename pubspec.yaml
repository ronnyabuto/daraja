name: daraja
description: Full M-Pesa STK Push lifecycle for Flutter — initiation, real-time callback delivery, timeout handling, and killed-app recovery. Backed by Appwrite.
version: 0.1.1
homepage: https://github.com/ronnyabuto/daraja
repository: https://github.com/ronnyabuto/daraja
issue_tracker: https://github.com/ronnyabuto/daraja/issues

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  appwrite: ^23.0.0
  clock: ^1.1.2
  encrypt: ^5.0.3
  http: ^1.3.0
  pointycastle: ^3.9.1
  shared_preferences: ^2.5.5
  flutter_riverpod: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.2
  shared_preferences_platform_interface: ^2.4.2
